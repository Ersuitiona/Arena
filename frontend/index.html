<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Football Arena</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<!-- Splash Screen -->
<div id="splash" class="splash-screen">
  <h1>Welcome to the Football Arena</h1>
  <button onclick="enterArena()">Enter Arena</button>
</div>

<!-- Login/Register -->
<div id="auth" class="hidden">
  <h2>Login</h2>
  <form id="loginForm">
    <input type="text" id="loginUsername" placeholder="Username" required />
    <input type="password" id="loginPassword" placeholder="Password" required />
    <button type="submit">Login</button>
  </form>
  
  <h2>Register</h2>
  <form id="registerForm">
    <input type="text" id="clubName" placeholder="Club Name" required />
    <input type="text" id="regUsername" placeholder="Username" required />
    <input type="password" id="regPassword" placeholder="Password" required />
    <button type="submit">Sign Up</button>
  </form>
</div>

<!-- Main Dashboard (hidden initially) -->
<div id="dashboard" class="hidden">
  <h2>Club Dashboard</h2>
  <p>Welcome, <span id="clubNameDisplay"></span></p>
  <p>Balance: <span id="balanceDisplay"></span></p>
  <button onclick="logout()">Logout</button>
</div>

<script src="script.js"></script>
</body>
</html>
